<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekkospire Case Study</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: #0a0a0f;
            font-family: 'Inter', sans-serif;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* Navigation Bar */
        nav {
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            height: 80px;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-container {
            max-width: 1280px; /* 7xl */
            width: 100%;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-left {
            display: flex;
            align-items: center;
        }

        .logo-mark {
            height: 40px;
            width: auto;
            object-fit: contain;
        }

        .nav-links {
            display: flex;
            gap: 32px;
        }

        .nav-links a {
            color: #ffffff;
            font-size: 14px;
            text-decoration: none;
            font-weight: 400;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: #c41a00;
        }

        .nav-links a.back-link {
            color: #c41a00;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Image Container */
        .image-container {
            padding-top: 80px;
            font-size: 0;
            line-height: 0;
            width: 100%;
        }

        .image-container img {
            width: 100%;
            display: block;
            margin: 0;
            padding: 0;
            vertical-align: bottom;
            border: none;
        }

        /* Responsive Logic */
        .mobile-images {
            display: none;
        }

        .desktop-images {
            display: block;
        }

        @media (max-width: 1023px) {
            .desktop-images {
                display: none;
            }
            .mobile-images {
                display: block;
            }
        }

        /* Footer */
        footer {
            background: #0a0a0f;
            padding: 40px 0;
            text-align: center;
        }

        .footer-text {
            font-size: 12px;
            color: #444444;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-container">
            <div class="nav-left">
                <a href="/">
                    <img src="/Images/White_Vikrant_logo.png" alt="Logo" class="logo-mark">
                </a>
            </div>
            <div class="nav-links">
                <a href="/#work">Work</a>
                <a href="/#about">About</a>
                <a href="/#contact">Contact</a>
                <a href="/" class="back-link">← Back</a>
            </div>
        </div>
    </nav>

    <div class="image-container">
        <!-- Desktop Images -->
        <div class="desktop-images">
            <img src="/Images/Page-D1.png" alt="Ekkospire Desktop 1">
            <img src="/Images/Page-D2.png" alt="Ekkospire Desktop 2">
            <img src="/Images/Page-D3.png" alt="Ekkospire Desktop 3">
            <img src="/Images/Page-D4.png" alt="Ekkospire Desktop 4">
            <img src="/Images/Page-D5.png" alt="Ekkospire Desktop 5">
            <img src="/Images/Page-D6.png" alt="Ekkospire Desktop 6">
            <img src="/Images/Page-D7.png" alt="Ekkospire Desktop 7">
            <img src="/Images/Page-D8.png" alt="Ekkospire Desktop 8">
            <img src="/Images/Page-D9.png" alt="Ekkospire Desktop 9">
            <img src="/Images/Page-D10.png" alt="Ekkospire Desktop 10">
        </div>

        <!-- Mobile Images -->
        <div class="mobile-images">
            <img src="/public/Images/Page-M1.png" alt="Ekkospire Mobile 1">
            <img src="/public/Images//Page-M2.png" alt="Ekkospire Mobile 2">
            <img src="/public/Images//Page-M3.png" alt="Ekkospire Mobile 3">
            <img src="/public/Images//Page-M4.png" alt="Ekkospire Mobile 4">
            <img src="/public/Images//Page-M5.png" alt="Ekkospire Mobile 5">
            <img src="/public/Images//Page-M6.png" alt="Ekkospire Mobile 6">
            <img src="/public/Images//Page-M7.png" alt="Ekkospire Mobile 7">
            <img src="/public/Images//Page-M8.png" alt="Ekkospire Mobile 8">
            <img src="/public/Images//Page-M9.png" alt="Ekkospire Mobile 9">
        </div>
    </div>

    <footer>
        <div class="footer-text">
            © 2026 Vikrant Kumar. All rights reserved.
        </div>
    </footer>

    <script>
        // Fallback mechanism for missing desktop images
        document.querySelectorAll('.desktop-images img').forEach((img, index) => {
            img.onerror = function() {
                // Try to fallback to mobile version if desktop version fails
                const mobileSrc = `/Ekkospire/Mobile/Page-M${index + 1}.png`;
                if (this.src !== window.location.origin + mobileSrc) {
                    this.src = mobileSrc;
                } else {
                    // If mobile also fails, hide the image
                    this.style.display = 'none';
                }
            };
        });
    </script>
</body>
</html>
